<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Note Summarizer</title>
</head>
<body style="background:#f5f7fb; font-family:Arial, sans-serif;">

<div style="max-width:700px; margin:60px auto; text-align:center; background:white; padding:40px; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.08);">

    <h1 style="margin-bottom:10px;">AI Note Summarizer</h1>
    <p style="color:#555; margin-bottom:24px;">Paste your notes and get a clean summary instantly</p>

    <form method="POST" action="/summarize">
        <textarea
            name="text"
            placeholder="Paste your notes here..."
            rows="8"
            style="width:100%; padding:16px; border:1px solid #d1d5db; border-radius:12px; box-sizing:border-box; font-size:15px;"
        ></textarea>

        <br><br>

        <label for="model" style="display:block; text-align:left; margin-bottom:8px; font-weight:bold;">Model</label>
        <select
            name="model"
            id="model"
            style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:12px; box-sizing:border-box; font-size:15px;"
        >
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        </select>

        <br><br>

        <label for="additional_prompt" style="display:block; text-align:left; margin-bottom:8px; font-weight:bold;">Additional Prompt</label>
        <input
            type="text"
            name="additional_prompt"
            id="additional_prompt"
            placeholder="Optional extra instruction"
            style="width:100%; padding:12px; border:1px solid #d1d5db; border-radius:12px; box-sizing:border-box; font-size:15px;"
        >

        <p style="color:#666; font-size:14px;">Best for class notes, reading notes, or meeting notes.</p>

        <button
            type="submit"
            style="background:#4f46e5; color:white; border:none; padding:12px 24px; border-radius:10px; font-size:16px; cursor:pointer;"
            onclick="this.innerText='Summarizing...';"
        >
            Summarize
        </button>
    </form>

    {% if result %}
    <div style="margin-top:24px; background:#f3f4f6; padding:20px; border-radius:12px; text-align:left;">
        <h3 style="margin-top:0;">Summary</h3>
        <p>{{ result }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
